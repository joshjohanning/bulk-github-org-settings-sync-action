# Organization settings configuration for bulk-github-org-settings-sync-action
# Use with: organizations-file: './orgs.yml'
#
# Per-org overrides: inline vs file-based
# ----------------------------------------
# For most features, per-org config can be provided EITHER inline OR via a file
# path that overrides the base file for just that org:
#
#   inline:  custom-properties: [...]
#   file:    custom-properties-file: './config/custom-properties/other-org.yml'
#
# Inline values take precedence if both are specified. Most list-based features
# merge with the base by `name`; some replace the base for that org. Two
# features are file-only (no inline form): `rulesets-file` and
# `actions-allow-list-file`.
#
# See the README "Per-Org Overrides: Inline vs File-Based" section for the
# full feature matrix, precedence rules, and merge vs replace semantics:
# https://github.com/joshjohanning/bulk-github-org-settings-sync-action#per-org-overrides-inline-vs-file-based
#
# Optional: set a base path for all file-path settings (paths are resolved relative to this)
# base-path: './config/'

orgs:
  # Org that inherits all base settings from action inputs / file inputs as-is
  - org: my-org

  # Org with per-org INLINE overrides (layers on top of base action inputs / file inputs)
  - org: my-inline-org
    # --- Per-org boolean overrides ---
    # delete-unmanaged-properties: true
    # delete-unmanaged-issue-types: true
    # delete-unmanaged-rulesets: true
    # delete-unmanaged-org-roles: true
    # delete-unmanaged-repo-roles: true
    # delete-unmanaged-code-security-configurations: true

    # --- Per-org inline overrides (merges with base by name) ---
    custom-properties:
      - name: team
        value-type: single_select
        required: true
        description: 'The team that owns this repository'
        allowed-values:
          - platform
          - frontend
          - backend
          - data-science
        values-editable-by: org_actors
    issue-types:
      - name: Bug
        description: 'Something is broken'
        color: 'ff0000'
      - name: Feature
        description: 'A new feature request'
        color: '0e8a16'
      - name: Task
        description: 'A unit of work'
        color: 'fbca04'
    custom-org-roles:
      - name: Security Auditor
        description: 'Override for this org'
        permissions:
          - read_audit_log
    custom-repo-roles:
      - name: Contractor
        description: 'Override for this org'
        base-role: write
        permissions:
          - delete_alerts_code_scanning
    code-security-configurations:
      - name: High risk settings
        description: Security configuration for high risk repositories (stricter for this org)
        advanced_security: enabled
        secret_scanning: enabled
        secret_scanning_push_protection: enabled
        enforcement: enforced
        attach-scope: selected
        selected-repositories: [high-risk-service, app-api]
        default-for-new-repos: private_and_internal

    # --- Per-org inline overrides (replaces base for this org) ---
    organization-role-team-assignments:
      - role: security_manager
        teams:
          - security-team
          - appsec
        # delete-unmanaged: true # Remove teams assigned to this role that are not listed above
      - role: CI/CD Admin
        teams:
          - platform-admins

    # --- Per-org inline overrides (per-key override of base inputs) ---
    member-privileges:
      members-can-fork-private-repositories: true # Override the base setting for this org
      members-can-create-internal-repositories: true # GHEC/GHES only
    org-profile:
      org-name: 'My Inline Org'
      org-description: 'Custom description for this org'
    actions-policy:
      allowed-actions: selected # Override the base actions policy for this org
      github-owned-allowed: true
      verified-allowed: true
      default-workflow-permissions: read
      actions-can-approve-pull-request-reviews: false

  # Org with per-org FILE-BASED overrides (point to a different config file for this org)
  - org: my-file-based-org
    custom-properties-file: './config/custom-properties/file-based-org.yml'
    issue-types-file: './config/issue-types/file-based-org.yml'
    custom-org-roles-file: './config/custom-org-roles/file-based-org.yml'
    custom-repo-roles-file: './config/custom-repo-roles/file-based-org.yml'
    code-security-configurations-file: './config/code-security/file-based-org.yml'
    organization-role-team-assignments-file: './config/org-role-team-assignments/file-based-org.yml'

    # File-only features (no inline form)
    rulesets-file: # YAML array of ruleset JSON files (replaces base for this org)
      - './config/rulesets/branch-protection.json'
      - './config/rulesets/tag-protection.json'
    actions-allow-list-file: './config/actions-allow-list/file-based-org.yml'

    # .github / .github-private source directory overrides for this org
    dot-github-source-dir: './config/dot-github/file-based-org'
    dot-github-private-source-dir: './config/dot-github-private/file-based-org'

# ---
