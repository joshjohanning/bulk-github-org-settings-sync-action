# Organization settings configuration for bulk-github-org-settings-sync-action
# Use with: organizations-file: './orgs.yml'
#
# Optional: set a base path for all file-path settings (paths are resolved relative to this)
# base-path: './config/'
#
# Base custom properties can be defined in a separate custom-properties.yml file
# and provided via the custom-properties-file input. Per-org overrides below
# layer on top — properties with the same name override the base definition.
#
# Base issue types can be defined in a separate issue-types.yml file
# and provided via the issue-types-file input. Per-org overrides below
# layer on top — issue types with the same name override the base definition.
#
# Rulesets can be defined in separate JSON files (one ruleset per file) and
# provided via the rulesets-file input (comma-separated paths). Per-org
# rulesets-file overrides the base for that org. In the YAML config, you can
# use either a comma-separated string or a YAML array.
#
# Member privileges can be defined as direct action inputs. Per-org
# member-privileges overrides layer on top — settings with the same key
# override the base value.
#
# Organization role team assignments can be defined via the
# organization-role-team-assignments-file action input. Per-org
# organization-role-team-assignments replaces the base assignments for that org.
#
# Organization profile fields can be defined as direct action inputs. Per-org
# org-profile overrides layer on top — fields with the same key override the
# base value.
#
# Code security configurations can be defined in a separate
# code-security-configurations.yml file and provided via the
# code-security-configurations-file input. Per-org overrides below
# layer on top — configurations with the same name override the base definition.

orgs:
  # Org that inherits all base settings from action inputs / file inputs as-is
  - org: my-org

  # Org with per-org inline overrides (layers on top of base action inputs / file inputs)
  #
  # For most features, per-org config can be provided INLINE or via a FILE PATH:
  #   inline:  organization-role-team-assignments: [...]
  #   file:    organization-role-team-assignments-file: './config/my-other-org-roles.yml'
  #
  # The file path form lets you keep per-org config in separate files while
  # still using a single orgs.yml to map orgs. Inline values take precedence
  # if both are specified. Per-org values REPLACE the global base for that org
  # (they do not merge) unless noted otherwise below.
  - org: my-other-org
    # --- Per-org file path overrides (point to a different base file for this org) ---
    # custom-properties-file: './config/custom-properties/other-org.yml'
    # issue-types-file: './config/issue-types/other-org.yml'
    # rulesets-file:                              # YAML array of ruleset JSON files
    #   - './config/rulesets/branch-protection.json'
    #   - './config/rulesets/tag-protection.json'
    # code-security-configurations-file: './config/code-security/other-org.yml'
    # organization-role-team-assignments-file: './config/org-role-team-assignments/other-org.yml'
    # actions-allow-list-file: './config/actions-allow-list.yml'
    # dot-github-source-dir: './config/dot-github/other-org'
    # dot-github-private-source-dir: './config/dot-github-private/other-org'

    # --- Per-org boolean overrides ---
    # delete-unmanaged-properties: true
    # delete-unmanaged-issue-types: true
    # delete-unmanaged-rulesets: true

    # --- Per-org inline overrides ---
    custom-properties:
      - name: team
        value-type: single_select
        required: true
        description: 'The team that owns this repository'
        allowed-values:
          - platform
          - frontend
          - backend
          - data-science
        values-editable-by: org_actors
    issue-types:
      - name: Bug
        description: 'Something is broken'
        color: 'ff0000'
      - name: Feature
        description: 'A new feature request'
        color: '0e8a16'
      - name: Task
        description: 'A unit of work'
        color: 'fbca04'
    # Per-org member privilege overrides (layers on top of base action inputs)
    member-privileges:
      members-can-fork-private-repositories: true # Override the base setting for this org
      members-can-create-internal-repositories: true # GHEC/GHES only
    # Per-org organization role team assignments (replaces the global assignments for this org)
    organization-role-team-assignments:
      - role: security_manager
        teams:
          - security-team
          - appsec
        # delete-unmanaged: true # Remove teams assigned to this role that are not listed above
      - role: CI/CD Admin
        teams:
          - platform-admins
    # Per-org organization profile overrides (layers on top of base action inputs)
    org-profile:
      org-name: 'My Other Org'
      org-description: 'Custom description for this org'
    # Per-org code security configuration overrides (layers on top of base code-security-configurations-file)
    # delete-unmanaged-code-security-configurations: true
    code-security-configurations:
      - name: High risk settings
        description: Security configuration for high risk repositories (stricter for this org)
        advanced_security: enabled
        secret_scanning: enabled
        secret_scanning_push_protection: enabled
        enforcement: enforced
        attach-scope: selected
        selected-repositories: [high-risk-service, app-api]
        default-for-new-repos: private_and_internal
    # Per-org actions policy overrides (layers on top of base action inputs)
    actions-policy:
      allowed-actions: selected # Override the base actions policy for this org
      github-owned-allowed: true
      verified-allowed: true
      default-workflow-permissions: read
      actions-can-approve-pull-request-reviews: false

