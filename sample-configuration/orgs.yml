# Organization settings configuration for bulk-github-org-settings-sync-action
# Use with: organizations-file: './orgs.yml'
#
# Base custom properties can be defined in a separate custom-properties.yml file
# and provided via the custom-properties-file input. Per-org overrides below
# layer on top — properties with the same name override the base definition.

orgs:
  # Org that inherits all base properties from custom-properties-file as-is
  - org: my-org

  # Org with per-org inline overrides (layers on top of base custom-properties-file)
  - org: my-other-org
    # custom-properties-file: './config/custom-properties/other-org.yml' # Use a different base file for this org
    # delete-unmanaged-properties: true # Override the action input for this org
    custom-properties:
      - name: team
        value-type: single_select
        required: true
        description: 'The team that owns this repository'
        allowed-values:
          - platform
          - frontend
          - backend
          - data-science
        values-editable-by: org_actors

